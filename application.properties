spring.application.name=fleet-management-api
server.port=8080

# Default Eclipse-friendly local database. No MySQL installation or password is required.
# To use MySQL instead, run with the "mysql" Spring profile.
spring.datasource.url=jdbc:h2:file:./data/fleet_management;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

app.routing.osrm-base-url=https://router.project-osrm.org
app.routing.use-external-api=false
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Fleet Management API
info.app.description=Fleet registry, dispatch workflow, delivery tracking, and route optimization backend.
info.app.version=1.0.0

logging.pattern.level=%5p [%X{requestId}]

app.security.jwt-secret=${JWT_SECRET:local-development-secret-key-change-before-production-2026}
app.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.security.bootstrap-admin-email=${ADMIN_EMAIL:admin@fleet.local}
app.security.bootstrap-admin-password=${ADMIN_PASSWORD:Admin@12345}
